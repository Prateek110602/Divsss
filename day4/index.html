<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Four — What The Sky Remembers</title>
<meta name="description" content="Day four of nine.">
<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="day-label">Day Four <span aria-hidden="true">·</span> 4 of 9</div>

  <main id="locked-screen" class="page-shell" hidden>
    <div class="locked-screen"></div>
  </main>

  <main id="day-content" class="page-shell" hidden aria-hidden="true">
    <p class="eyebrow" style="text-align:center;">a sky, a shape, a memory</p>
    <h1 style="text-align:center;">Some stars shine a little brighter than the rest.</h1>
    <p class="lead" style="text-align:center;max-width:480px;margin:0 auto var(--space-md);color:var(--text-muted);">
      Connect them in the order that feels right. Wrong ones just fizzle out — nothing breaks.
    </p>

    <div class="sky-wrap">
      <svg id="sky" viewBox="0 0 300 300" role="img" aria-label="A night sky of stars, connect them to form a hidden shape">
        <g id="lines"></g>
        <g id="stars"></g>
      </svg>
    </div>

    <p class="hint-box" id="skyHint" aria-live="polite"></p>

    <div class="reveal-box" id="revealBox" hidden>
      <p class="journal-fragment" id="revealFragment"></p>
      <p id="revealText"></p>
      <p class="handwritten" style="font-size:1.4rem;color:var(--rose-accent);">— Cutuuuu, look up more often</p>
    </div>

    <div class="progress-dots" aria-hidden="true">
      <span class="filled"></span><span class="filled"></span><span class="filled"></span><span class="filled"></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </main>

  <script src="../assets/config/config.js"></script>
  <script src="../assets/js/progress.js"></script>
  <script src="../assets/js/particles.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="./script.js"></script>
</body>
</html>
