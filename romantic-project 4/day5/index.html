<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Five — Pieces Of Us</title>
<meta name="description" content="Day five of nine.">
<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="day-label">Day Five <span aria-hidden="true">·</span> 5 of 9</div>

  <main id="locked-screen" class="page-shell" hidden>
    <div class="locked-screen"></div>
  </main>

  <main id="day-content" class="page-shell" hidden aria-hidden="true">
    <p class="eyebrow" style="text-align:center;">a memory, in pieces</p>
    <h1 style="text-align:center;">Match the pieces back together.</h1>
    <p class="lead" style="text-align:center;max-width:480px;margin:0 auto var(--space-md);color:var(--text-muted);">
      Each pair belongs to a different day. Some you've already lived through.
    </p>

    <div class="memory-grid" id="memoryGrid" role="group" aria-label="Memory matching game"></div>

    <p class="hint-box" id="memoryHint" aria-live="polite"></p>

    <div class="reveal-box" id="revealBox" hidden>
      <p class="journal-fragment" id="revealFragment"></p>
      <p id="revealText"></p>
      <p class="handwritten" style="font-size:1.4rem;color:var(--rose-accent);">— Divvsss, keep going</p>
    </div>

    <div class="progress-dots" aria-hidden="true">
      <span class="filled"></span><span class="filled"></span><span class="filled"></span><span class="filled"></span><span class="filled"></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </main>

  <script src="../assets/config/config.js"></script>
  <script src="../assets/js/progress.js"></script>
  <script src="../assets/js/particles.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="./script.js"></script>
</body>
</html>
