<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Three — The Shelf</title>
<meta name="description" content="Day three of nine.">
<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="day-label">Day Three <span aria-hidden="true">·</span> 3 of 9</div>

  <main id="locked-screen" class="page-shell" hidden>
    <div class="locked-screen"></div>
  </main>

  <main id="day-content" class="page-shell" hidden aria-hidden="true">
    <p class="eyebrow" style="text-align:center;">a shelf, mostly ordinary</p>
    <h1 style="text-align:center;">One of these books doesn't belong.</h1>
    <p class="lead" style="text-align:center;max-width:480px;margin:0 auto var(--space-md);color:var(--text-muted);">
      Look closely before you touch anything.
    </p>

    <div class="bookshelf" id="bookshelf" role="group" aria-label="Bookshelf, find the book that doesn't belong">
      <div class="shelf-back">
        <div class="cubby" id="cubby" hidden>
          <div class="folded-note" id="foldedNote" tabindex="0" role="button" aria-label="A folded note, click to open">
            <span class="handwritten">open me</span>
          </div>
        </div>
      </div>

      <div class="shelf-books" id="shelfBooks">
        <!-- Books injected by script.js so titles/heights stay easy to edit in one place -->
      </div>
      <div class="shelf-plank"></div>
    </div>

    <p class="hint-box" id="shelfHint" aria-live="polite"></p>

    <div class="reveal-box" id="revealBox" hidden>
      <p class="journal-fragment" id="revealFragment"></p>
      <p id="revealText"></p>
      <p class="handwritten" style="font-size:1.4rem;color:var(--rose-accent);">— Mrignaini, one shelf closer</p>
    </div>

    <div class="progress-dots" aria-hidden="true">
      <span class="filled"></span><span class="filled"></span><span class="filled"></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </main>

  <script src="../assets/config/config.js"></script>
  <script src="../assets/js/progress.js"></script>
  <script src="../assets/js/particles.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="./script.js"></script>
</body>
</html>
