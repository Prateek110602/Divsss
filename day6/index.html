<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Six — The Locked Diary</title>
<meta name="description" content="Day six of nine.">
<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="day-label">Day Six <span aria-hidden="true">·</span> 6 of 9</div>

  <main id="locked-screen" class="page-shell" hidden>
    <div class="locked-screen"></div>
  </main>

  <main id="day-content" class="page-shell" hidden aria-hidden="true">
    <p class="eyebrow" style="text-align:center;">some things need the right words</p>
    <h1 style="text-align:center;">This diary only opens for one password.</h1>
    <p class="lead" style="text-align:center;max-width:480px;margin:0 auto var(--space-md);color:var(--text-muted);">
      You already know it. You say it to me more than you probably realise.
    </p>

    <div class="diary" id="diary">
      <div class="diary-cover" id="diaryCover">
        <div class="diary-clasp">🔒</div>
        <form id="lockForm" class="lock-form" autocomplete="off">
          <label for="lockInput" class="visually-hidden">Type the password</label>
          <input id="lockInput" type="text" placeholder="type it here..." />
          <button type="submit" class="btn btn-primary">Unlock</button>
        </form>
      </div>

      <div class="diary-pages" id="diaryPages" hidden>
        <p class="journal-fragment" id="revealFragment"></p>
        <p id="revealText"></p>
        <p class="handwritten" style="font-size:1.4rem;color:var(--rose-accent);">— yes, I know what you call me</p>
      </div>
    </div>

    <p class="hint-box" id="lockHint" aria-live="polite"></p>

    <div class="progress-dots" aria-hidden="true">
      <span class="filled"></span><span class="filled"></span><span class="filled"></span><span class="filled"></span><span class="filled"></span>
      <span class="filled"></span><span></span><span></span><span></span>
    </div>
  </main>

  <script src="../assets/config/config.js"></script>
  <script src="../assets/js/progress.js"></script>
  <script src="../assets/js/particles.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="./script.js"></script>
</body>
</html>
